<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile Card</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css" type="text/css" />
</head>

<body>

  <article class="card" data-testid="test-profile-card">

    <figure>
      <img src="profile avata.jpeg" alt="Profile avatar of user" data-testid="test-user-avatar" />
    </figure>

    <div>
      <header>
        <h2 data-testid="test-user-name">Eric Tjr</h2>
        <div class="time" data-testid="test-user-time" aria-live="polite"></div>
      </header>

      <p data-testid="test-user-bio">
        A passionate frontend learner building responsive and accessible web components while exploring modern web
        technologies.
      </p>

      <section data-testid="test-user-social-links">
        <h3>Social Links</h3>
        <ul>
          <li data-testid="test-user-social-twitter"><a href="https://twitter.com" target="_blank"
              rel="noopener noreferrer">Twitter</a></li>
          <li data-testid="test-user-social-github"><a href="https://github.com" target="_blank"
              rel="noopener noreferrer">GitHub</a></li>
          <li data-testid="test-user-social-linkedin"><a href="https://linkedin.com" target="_blank"
              rel="noopener noreferrer">LinkedIn</a></li>
        </ul>
      </section>

      <section data-testid="test-user-hobbies">
        <h3>Hobbies</h3>
        <ul>
          <li>Coding</li>
          <li>Reading</li>
          <li>Design</li>
        </ul>
      </section>

      <section data-testid="test-user-dislikes">
        <h3>Dislikes</h3>
        <ul>
          <li>Unclean code</li>
          <li>Slow websites</li>
          <li>Unresponsive layouts</li>
        </ul>
      </section>

    </div>
  </article>

  <script>
    const timeEl = document.querySelector('[data-testid="test-user-time"]');

    function updateTime() {
      timeEl.textContent = Date.now();
    }

    updateTime();
    setInterval(updateTime, 1000);
  </script>

</body>

</html>
